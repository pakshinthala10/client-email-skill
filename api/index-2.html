<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Weekly Email Skill</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f7f6f5;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 780px; margin: 0 auto; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    .header-title { font-size: 18px; font-weight: 500; }
    .header-sub { font-size: 13px; color: #999; margin-top: 2px; }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #534AB7;
      background: #F0EFF9;
      border: 0.5px solid #C9C6F0;
      border-radius: 20px;
      padding: 5px 13px;
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #3B6D11;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Labels ── */
    .label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #aaa;
      margin-bottom: 10px;
    }

    /* ── Client grid ── */
    .client-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 24px;
    }
    .client-card {
      background: #fff;
      border: 0.5px solid #e5e5e5;
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .client-card:hover { border-color: #bbb; }
    .client-card.active { border: 2px solid #534AB7; }
    .client-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
    .client-sub { font-size: 11px; color: #999; }
    .client-pri { font-size: 11px; color: #534AB7; margin-top: 6px; }

    /* Shimmer loader */
    .shimmer {
      background: linear-gradient(90deg, #efefef 25%, #e0e0e0 50%, #efefef 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 10px;
      height: 82px;
    }
    @keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }

    /* ── Detail panel ── */
    .panel {
      background: #fff;
      border: 0.5px solid #e5e5e5;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 14px;
    }

    .meta-row {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }
    .meta-pill {
      font-size: 11px;
      background: #f5f5f5;
      border: 0.5px solid #e5e5e5;
      border-radius: 20px;
      padding: 3px 10px;
      color: #666;
    }
    .notion-link {
      font-size: 11px;
      color: #534AB7;
      background: #F0EFF9;
      border: 0.5px solid #C9C6F0;
      border-radius: 20px;
      padding: 3px 10px;
      text-decoration: none;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 2px;
      border-bottom: 0.5px solid #eee;
      margin-bottom: 16px;
    }
    .tab {
      font-size: 12px;
      padding: 7px 14px;
      border: none;
      background: none;
      color: #999;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -0.5px;
      font-family: inherit;
      transition: all 0.12s;
    }
    .tab:hover { color: #444; }
    .tab.active { color: #534AB7; border-bottom-color: #534AB7; font-weight: 500; }

    /* ── Analysis ── */
    .analysis-row {
      display: flex;
      gap: 14px;
      padding: 9px 0;
      border-bottom: 0.5px solid #f2f2f2;
      font-size: 13px;
    }
    .analysis-row:last-child { border-bottom: none; }
    .area-name { font-weight: 500; color: #666; min-width: 95px; flex-shrink: 0; font-size: 12px; }
    .area-text { color: #333; line-height: 1.55; flex: 1; }

    /* ── Tasks ── */
    .task-card {
      display: flex;
      gap: 10px;
      padding: 10px 12px;
      border: 0.5px solid #eee;
      border-radius: 8px;
      margin-bottom: 6px;
      background: #fff;
    }
    .task-icon {
      width: 18px; height: 18px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; flex-shrink: 0; margin-top: 1px;
    }
    .ic-done { background: #EAF3DE; color: #3B6D11; }
    .ic-prog { background: #FAEEDA; color: #854F0B; }
    .ic-todo { background: #f0f0f0; color: #777; }
    .task-name { font-size: 13px; color: #222; margin-bottom: 2px; }
    .task-note { font-size: 11px; color: #aaa; font-style: italic; margin-bottom: 5px; }
    .tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .tag { font-size: 10px; padding: 1px 7px; border-radius: 20px; font-weight: 500; }
    .t-task { background: #E6F1FB; color: #185FA5; }
    .t-goal { background: #EEEDFE; color: #534AB7; }
    .t-high { background: #FCEBEB; color: #A32D2D; }
    .t-med  { background: #FAEEDA; color: #854F0B; }
    .t-low  { background: #EAF3DE; color: #3B6D11; }
    .t-stat { background: #f5f5f5; color: #777; border: 0.5px solid #e8e8e8; }

    /* ── Email settings ── */
    .field-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      align-items: flex-start;
    }
    .field-label {
      font-size: 12px;
      color: #777;
      min-width: 68px;
      font-weight: 500;
      padding-top: 7px;
    }
    input, select, textarea {
      flex: 1;
      font-size: 13px;
      padding: 6px 10px;
      border: 0.5px solid #ddd;
      border-radius: 6px;
      outline: none;
      font-family: inherit;
      color: #333;
      background: #fff;
    }
    input:focus, select:focus, textarea:focus { border-color: #534AB7; box-shadow: 0 0 0 3px #EEEDFE; }
    textarea { resize: vertical; }

    /* ── Generate button ── */
    .gen-btn {
      width: 100%;
      padding: 12px;
      background: #534AB7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 16px;
      font-family: inherit;
      transition: opacity 0.15s;
      letter-spacing: 0.01em;
    }
    .gen-btn:hover:not(:disabled) { opacity: 0.88; }
    .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Email output ── */
    .email-card {
      background: #fff;
      border: 0.5px solid #e5e5e5;
      border-radius: 12px;
      padding: 20px;
    }
    .email-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding-bottom: 12px;
      margin-bottom: 14px;
      border-bottom: 0.5px solid #eee;
    }
    .email-subject { font-size: 13px; font-weight: 500; color: #444; }
    .email-to { font-size: 11px; color: #aaa; margin-top: 3px; }
    .copy-btn {
      font-size: 12px;
      padding: 5px 12px;
      border: 0.5px solid #C9C6F0;
      border-radius: 6px;
      background: #F0EFF9;
      color: #534AB7;
      cursor: pointer;
      font-family: inherit;
      flex-shrink: 0;
    }
    .copy-btn:hover { background: #E4E2F9; }
    .email-body {
      font-size: 14px;
      color: #333;
      line-height: 1.78;
      white-space: pre-wrap;
    }

    /* ── States ── */
    .placeholder { text-align: center; color: #ccc; font-size: 13px; padding: 2.5rem 1rem; }
    .error-msg { color: #A32D2D; font-size: 13px; padding: 12px; background: #FCEBEB; border-radius: 8px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
    .blink { animation: blink 1s infinite; }

    @media (max-width: 580px) {
      .client-grid { grid-template-columns: 1fr 1fr; }
      .header { flex-direction: column; gap: 10px; align-items: flex-start; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="header-title">Client Weekly Email Skill</div>
      <div class="header-sub">Powered by your Notion database + Claude</div>
    </div>
    <div class="live-badge">
      <span class="live-dot"></span>
      Live from Notion
    </div>
  </div>

  <!-- Client picker -->
  <div class="label">Select a client</div>
  <div class="client-grid" id="clientGrid">
    <div class="shimmer"></div>
    <div class="shimmer"></div>
    <div class="shimmer"></div>
  </div>

  <!-- Detail (hidden until client selected) -->
  <div id="detail" style="display:none">

    <div class="panel">
      <!-- Client meta -->
      <div class="meta-row" id="metaRow"></div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('analysis')">Analysis</button>
        <button class="tab" onclick="switchTab('lastweek')">Last week</button>
        <button class="tab" onclick="switchTab('goals')">This week's goals</button>
        <button class="tab" onclick="switchTab('settings')">Email settings</button>
      </div>

      <!-- Tab: Analysis -->
      <div id="tab-analysis"></div>

      <!-- Tab: Last week tasks -->
      <div id="tab-lastweek" style="display:none"></div>

      <!-- Tab: This week goals -->
      <div id="tab-goals" style="display:none"></div>

      <!-- Tab: Email settings -->
      <div id="tab-settings" style="display:none">
        <div class="field-row">
          <span class="field-label">To</span>
          <input id="toName" placeholder="Recipient name" style="max-width:150px" />
          <input id="toEmail" placeholder="email@client.com" />
        </div>
        <div class="field-row">
          <span class="field-label">From</span>
          <input id="fromName" value="Your Advisory Team" />
        </div>
        <div class="field-row">
          <span class="field-label">Tone</span>
          <select id="emailTone">
            <option value="professional and warm">Professional and warm</option>
            <option value="concise and executive">Concise and executive</option>
            <option value="consultative and detailed">Consultative and detailed</option>
            <option value="friendly and direct">Friendly and direct</option>
          </select>
        </div>
        <div class="field-row">
          <span class="field-label">Notes</span>
          <textarea id="extraNotes" rows="2" placeholder="Any special context for this week's email..."></textarea>
        </div>
      </div>
    </div>

    <!-- Generate button -->
    <button class="gen-btn" id="genBtn" onclick="generateEmail()">
      ✦ Generate weekly email
    </button>

    <!-- Email output -->
    <div id="emailArea">
      <div class="placeholder">Your drafted email will appear here.</div>
    </div>

  </div>
</div>

<script>
  // ── State ────────────────────────────────────────────────────────
  let allClients = [];
  let selectedClient = null;
  let selectedTasks = [];

  const STATUS_ICON = { 'Done': '✓', 'In Progress': '→', 'Not Started': '○' };
  const STATUS_CLS  = { 'Done': 'ic-done', 'In Progress': 'ic-prog', 'Not Started': 'ic-todo' };
  const PRIO_CLS    = { 'High': 't-high', 'Medium': 't-med', 'Low': 't-low' };

  // ── Notion response parsers ──────────────────────────────────────
  // Extract plain text from any Notion property type
  function getProp(p, key) {
    const prop = p[key];
    if (!prop) return '';
    if (prop.title)      return prop.title.map(t => t.plain_text).join('');
    if (prop.rich_text)  return prop.rich_text.map(t => t.plain_text).join('');
    if (prop.select)     return prop.select?.name || '';
    if (prop.email)      return prop.email || '';
    if (prop.number !== undefined && prop.number !== null) return prop.number;
    return '';
  }

  // Analysis fields may use em dash (—) or hyphen (-) depending on Notion version
  function getAnalysis(p, area) {
    return getProp(p, `Analysis Findings \u2014 ${area}`) ||
           getProp(p, `Analysis Findings - ${area}`) || '';
  }

  function parseClient(page) {
    const p = page.properties;
    return {
      id:       page.id,
      url:      page.url,
      name:     getProp(p, 'Client Name')            || 'Unknown',
      industry: getProp(p, 'Industry')               || '',
      size:     getProp(p, 'Company Size')            || '',
      week:     getProp(p, 'Current Engagement Week') || 1,
      contact:  getProp(p, 'Primary Contact Name')   || '',
      email:    getProp(p, 'Primary Contact Email')   || '',
      priority: getProp(p, 'Overall Priority Score')  || 0,
      analysis: {
        Finance:    getAnalysis(p, 'Finance'),
        Technology: getAnalysis(p, 'Technology'),
        Strategy:   getAnalysis(p, 'Strategy'),
        Operations: getAnalysis(p, 'Operations'),
        Culture:    getAnalysis(p, 'Culture'),
      }
    };
  }

  function parseTask(page) {
    const p = page.properties;
    return {
      name:     getProp(p, 'Task Name') || '',
      status:   getProp(p, 'Status')    || 'Not Started',
      type:     getProp(p, 'Type')      || 'Task',
      priority: getProp(p, 'Priority')  || 'Medium',
      week:     getProp(p, 'Week Number') || 0,
      note:     getProp(p, 'Notes')     || ''
    };
  }

  // ── API helper ───────────────────────────────────────────────────
  async function callAPI(body) {
    const res = await fetch('/api', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`API error ${res.status}`);
    return res.json();
  }

  // ── Load clients on page load ────────────────────────────────────
  async function loadClients() {
    try {
      const data = await callAPI({ action: 'getClients' });
      allClients = (data.results || []).map(parseClient);
      renderClientGrid();
    } catch (err) {
      document.getElementById('clientGrid').innerHTML =
        `<div class="error-msg" style="grid-column:1/-1">
          Could not load clients. Check your Notion token and database ID.<br>
          <small>${err.message}</small>
        </div>`;
    }
  }

  function renderClientGrid() {
    document.getElementById('clientGrid').innerHTML = allClients.map(c => `
      <div class="client-card ${selectedClient?.id === c.id ? 'active' : ''}"
           onclick="pickClient('${c.id}')">
        <div class="client-name">${c.name}</div>
        <div class="client-sub">${c.industry}${c.size ? ' · ' + c.size : ''}</div>
        ${c.priority ? `<div class="client-pri">★ Priority ${c.priority}/10</div>` : ''}
      </div>`).join('');
  }

  // ── Pick a client ────────────────────────────────────────────────
  async function pickClient(id) {
    selectedClient = allClients.find(c => c.id === id);
    if (!selectedClient) return;

    // Update grid active state
    renderClientGrid();

    // Show detail panel
    document.getElementById('detail').style.display = 'block';
    document.getElementById('emailArea').innerHTML =
      '<div class="placeholder">Click "Generate weekly email" when ready.</div>';

    // Pre-fill email settings
    document.getElementById('toName').value   = selectedClient.contact;
    document.getElementById('toEmail').value  = selectedClient.email;

    // Meta bar
    document.getElementById('metaRow').innerHTML = `
      <span class="meta-pill">Week ${selectedClient.week}</span>
      <span class="meta-pill">${selectedClient.contact}</span>
      <span class="meta-pill">${selectedClient.email}</span>
      ${selectedClient.industry ? `<span class="meta-pill">${selectedClient.industry}</span>` : ''}
      <a class="notion-link" href="${selectedClient.url}" target="_blank">Open in Notion ↗</a>`;

    // Render analysis tab immediately (no API call needed)
    const analysisRows = Object.entries(selectedClient.analysis)
      .filter(([, v]) => v)
      .map(([area, text]) => `
        <div class="analysis-row">
          <span class="area-name">${area}</span>
          <span class="area-text">${text}</span>
        </div>`).join('');

    document.getElementById('tab-analysis').innerHTML =
      analysisRows || '<div class="placeholder">No analysis data found for this client.</div>';

    // Show loading state for tasks
    document.getElementById('tab-lastweek').innerHTML =
      '<div class="placeholder">Loading tasks from Notion...</div>';
    document.getElementById('tab-goals').innerHTML =
      '<div class="placeholder">Loading goals from Notion...</div>';

    switchTab('analysis');

    // Fetch tasks async
    try {
      const data = await callAPI({ action: 'getTasks', clientPageId: selectedClient.id });
      selectedTasks = (data.results || []).map(parseTask);
      renderTaskTabs();
    } catch (err) {
      const msg = `<div class="error-msg">Could not load tasks: ${err.message}</div>`;
      document.getElementById('tab-lastweek').innerHTML = msg;
      document.getElementById('tab-goals').innerHTML = msg;
    }
  }

  // ── Render last week + this week goal tabs ───────────────────────
  function renderTaskTabs() {
    const w = selectedClient.week;
    const lastWeek   = selectedTasks.filter(t => t.week === w - 1 && t.type === 'Task');
    const thisWeek   = selectedTasks.filter(t => t.week === w && t.type === 'Goal');

    document.getElementById('tab-lastweek').innerHTML =
      `<div class="label" style="margin-bottom:10px">Week ${w - 1} tasks</div>` +
      (lastWeek.length
        ? lastWeek.map(taskHTML).join('')
        : '<div class="placeholder">No tasks found for last week.</div>');

    document.getElementById('tab-goals').innerHTML =
      `<div class="label" style="margin-bottom:10px">Week ${w} goals</div>` +
      (thisWeek.length
        ? thisWeek.map(taskHTML).join('')
        : '<div class="placeholder">No goals set for this week yet.</div>');
  }

  function taskHTML(t) {
    return `<div class="task-card">
      <div class="task-icon ${STATUS_CLS[t.status] || 'ic-todo'}">${STATUS_ICON[t.status] || '○'}</div>
      <div style="flex:1">
        <div class="task-name">${t.name}</div>
        ${t.note ? `<div class="task-note">${t.note}</div>` : ''}
        <div class="tags">
          <span class="tag ${t.type === 'Goal' ? 't-goal' : 't-task'}">${t.type}</span>
          <span class="tag ${PRIO_CLS[t.priority] || 't-med'}">${t.priority}</span>
          <span class="tag t-stat">${t.status}</span>
        </div>
      </div>
    </div>`;
  }

  // ── Tab switching ────────────────────────────────────────────────
  function switchTab(tab) {
    const names = ['analysis', 'lastweek', 'goals', 'settings'];
    document.querySelectorAll('.tab').forEach((btn, i) =>
      btn.classList.toggle('active', names[i] === tab));
    names.forEach(n => {
      const el = document.getElementById(`tab-${n}`);
      if (el) el.style.display = n === tab ? 'block' : 'none';
    });
  }

  // ── Generate email ───────────────────────────────────────────────
  async function generateEmail() {
    if (!selectedClient) return;

    const btn = document.getElementById('genBtn');
    btn.disabled = true;
    btn.textContent = '● Drafting...';

    const w          = selectedClient.week;
    const lastWeek   = selectedTasks.filter(t => t.week === w - 1 && t.type === 'Task');
    const thisWeek   = selectedTasks.filter(t => t.week === w && t.type === 'Goal');
    const toName     = document.getElementById('toName').value     || selectedClient.contact;
    const fromName   = document.getElementById('fromName').value   || 'Your Advisory Team';
    const tone       = document.getElementById('emailTone').value;
    const extraNotes = document.getElementById('extraNotes').value;

    const analysisBlock = Object.entries(selectedClient.analysis)
      .filter(([, v]) => v)
      .map(([a, f]) => `- ${a}: ${f}`).join('\n');

    const lastWeekBlock = lastWeek.length
      ? lastWeek.map(t =>
          `- [${t.status}] ${t.name}${t.note ? ' — ' + t.note : ''} (${t.priority} priority)`
        ).join('\n')
      : 'No tasks recorded for last week.';

    const thisWeekBlock = thisWeek.length
      ? thisWeek.map((g, i) =>
          `${i + 1}. ${g.name} (${g.priority} priority, currently ${g.status})${g.note ? ' — ' + g.note : ''}`
        ).join('\n')
      : 'No goals set for this week yet.';

    const prompt = `You are a management consultant writing a weekly client update email. Tone: ${tone}.

CLIENT: ${selectedClient.name} (${selectedClient.industry}, ${selectedClient.size})
ENGAGEMENT WEEK: ${w}
RECIPIENT: ${toName} <${selectedClient.email}>
SENDER: ${fromName}

ANALYSIS FINDINGS FROM INITIAL ENGAGEMENT:
${analysisBlock}

LAST WEEK'S TASKS (Week ${w - 1}) — pulled from Notion:
${lastWeekBlock}

THIS WEEK'S PRIORITY GOALS (Week ${w}) — pulled from Notion:
${thisWeekBlock}
${extraNotes ? '\nADDITIONAL CONTEXT: ' + extraNotes : ''}

Write a client-facing weekly update email:
1. Brief, warm opening referencing Week ${w} of the engagement
2. Recap of last week — acknowledge what was completed, note what is still in progress or not started
3. This week's goals listed clearly and in order — use the exact names from the data above, do not rephrase or invent new ones
4. Brief, confident, forward-looking closing

Under 380 words. Short paragraphs. Email body only — no subject line.`;

    document.getElementById('emailArea').innerHTML =
      '<div class="email-card"><div class="email-body" style="color:#bbb">Drafting email <span class="blink">●</span></div></div>';

    try {
      const data = await callAPI({ action: 'generateEmail', prompt });
      const text = data.content?.find(b => b.type === 'text')?.text;
      if (!text) throw new Error('No text returned from Claude.');

      const subject = `Week ${w} Update — ${selectedClient.name}`;
      const escaped = text.replace(/`/g, '\\`').replace(/\$/g, '\\$');

      document.getElementById('emailArea').innerHTML = `
        <div class="email-card">
          <div class="email-top">
            <div>
              <div class="email-subject">${subject}</div>
              <div class="email-to">To: ${toName} &lt;${selectedClient.email}&gt;</div>
            </div>
            <button class="copy-btn" onclick="copyEmail(this, \`${escaped}\`)">Copy</button>
          </div>
          <div class="email-body">${text}</div>
        </div>`;

    } catch (err) {
      document.getElementById('emailArea').innerHTML =
        `<div class="error-msg">Could not generate email: ${err.message}</div>`;
    }

    btn.disabled = false;
    btn.textContent = '✦ Regenerate email';
  }

  function copyEmail(btn, text) {
    navigator.clipboard.writeText(text);
    btn.textContent = '✓ Copied';
    setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
  }

  // ── Boot ─────────────────────────────────────────────────────────
  loadClients();
</script>
</body>
</html>
